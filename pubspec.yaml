name: localization_sheets
description: >-
  Convert Google-Sheets-style localization CSV exports into per-language JSON
  files. Supports metadata anchoring on a "key" cell, arbitrarily deep
  "YAML-in-CSV" nested keys, comment columns/rows and ignorable keys.
version: 0.1.0
repository: https://github.com/quinvq/localization_sheets

environment:
  sdk: ^3.10.0

# This package is a pure-Dart command line tool. The core read → parse → write
# library has no runtime dependencies; the CLI adds `yaml` so it can read an
# optional `localization_sheets.yaml` config, and downloads remote sheets with
# `dart:io`'s HttpClient (no extra HTTP dependency).
executables:
  localization_sheets: localization_sheets

dependencies:
  yaml: ^3.1.2

dev_dependencies:
  lints: ^6.0.0
  test: ^1.26.0
